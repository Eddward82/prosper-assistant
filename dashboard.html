<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prosper Assistant — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
body{background:#1a5f3f;min-height:100vh;color:#1a1a1a;}
.app-container{max-width:1200px;margin:0 auto;padding:20px;}
.app-header{text-align:center;color:white;padding:20px;}
.app-header h1{font-size:32px;}
.app-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
.card{background:white;border-radius:12px;padding:20px;}
.card h2{color:#1a5f3f;margin-bottom:15px;}
.chat{height:500px;display:flex;flex-direction:column;}
.messages{flex:1;overflow-y:auto;padding:10px 0;}
.msg{padding:10px;border-radius:8px;margin-bottom:8px;max-width:85%;white-space:pre-wrap;}
.msg.user{background:#1a5f3f;color:white;margin-left:auto;}
.msg.bot{background:#f0f0f0;}
.input-area{display:flex;gap:8px;margin-top:10px;}
.input-area input{flex:1;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:14px;}
.input-area button{padding:12px 20px;background:#1a5f3f;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;}
.stat{background:#e8f5e8;padding:12px;border-radius:8px;}
.stat-label{font-size:11px;color:#666;text-transform:uppercase;}
.stat-value{font-size:20px;font-weight:bold;color:#1a5f3f;}
.suggestion{display:inline-block;padding:5px 10px;background:#f0f0f0;border-radius:15px;margin:3px;cursor:pointer;font-size:12px;}
.suggestion:hover{background:#ddd;}
.unpaid-item{padding:8px;border-bottom:1px solid #eee;font-size:13px;display:flex;justify-content:space-between;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a5f3f;display:none;align-items:center;justify-content:center;z-index:100;}
.modal.show{display:flex;}
.modal-content{background:white;border-radius:16px;padding:40px;max-width:480px;width:90%;}
.modal-content .logo-emoji{text-align:center;font-size:36px;margin-bottom:10px;}
.modal-content h2{color:#1a5f3f;margin-bottom:8px;text-align:center;}
.modal-content p{color:#666;margin-bottom:25px;font-size:14px;text-align:center;}
.modal-content label{display:block;font-weight:bold;margin-bottom:5px;font-size:13px;color:#333;}
.modal-content input{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;margin-bottom:15px;font-size:14px;}
.modal-content button{width:100%;padding:14px;font-size:16px;font-weight:bold;background:#1a5f3f;color:white;border:none;border-radius:8px;cursor:pointer;}
.profile-bar{background:rgba(255,255,255,0.1);color:white;padding:10px 20px;border-radius:8px;margin-bottom:10px;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
.profile-bar button{padding:5px 10px;background:rgba(255,255,255,0.2);border:none;color:white;border-radius:5px;cursor:pointer;}
.back-link{display:inline-block;color:white;text-decoration:none;font-size:14px;margin-bottom:10px;opacity:0.8;}
.back-link:hover{opacity:1;}
@media(max-width:700px){.app-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="modal" id="welcomeModal">
  <div class="modal-content">
    <div class="logo-emoji">🧾</div>
    <h2>Welcome to Prosper</h2>
    <p>Let us set up your business profile</p>
    <label>Business Name</label>
    <input id="bizName" placeholder="e.g. Amaka Provisions Store">
    <label>Your Name</label>
    <input id="ownerName" placeholder="e.g. Amaka Johnson">
    <label>Business Email</label>
    <input id="bizEmail" type="email" placeholder="e.g. amaka@gmail.com">
    <button onclick="saveProfile()">Start Using Prosper</button>
  </div>
</div>

<div class="app-container">
  <a href="index.html" class="back-link">← Back to Home</a>
  <div class="app-header"><h1>🧾 Prosper Assistant</h1></div>
  <div class="profile-bar" id="profileBar" style="display:none;">
    <span id="profileText"></span>
    <button onclick="resetProfile()">Change Business</button>
  </div>
  <div class="app-grid">
    <div class="card chat">
      <h2>Chat with Prosper</h2>
      <div class="messages" id="messages"></div>
      <div>
        <span class="suggestion" onclick="quick('Who owes me money?')">Who owes me?</span>
        <span class="suggestion" onclick="quick('Today report')">Today report</span>
        <span class="suggestion" onclick="quick('Lifetime report')">Lifetime report</span>
        <span class="suggestion" onclick="quick('All sales')">All sales</span>
      </div>
      <div class="input-area">
        <input id="input" placeholder="Ask Prosper..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()">Send</button>
      </div>
    </div>
    <div class="card">
      <h2>Dashboard</h2>
      <div class="stats">
        <div class="stat"><div class="stat-label">Today Revenue</div><div class="stat-value" id="tr">-</div></div>
        <div class="stat"><div class="stat-label">Today Profit</div><div class="stat-value" id="tp">-</div></div>
        <div class="stat"><div class="stat-label">Lifetime Revenue</div><div class="stat-value" id="lr">-</div></div>
        <div class="stat"><div class="stat-label">Outstanding</div><div class="stat-value" id="out">-</div></div>
        <div class="stat"><div class="stat-label">Customers</div><div class="stat-value" id="cust">-</div></div>
        <div class="stat"><div class="stat-label">Total Sales</div><div class="stat-value" id="ts">-</div></div>
      </div>
      <h2>Unpaid Invoices</h2>
      <div id="unpaidList"></div>
    </div>
  </div>
</div>

<script>
const API = "https://prosper-assistant-666245775274.us-central1.run.app";

function loadProfile() {
  const p = localStorage.getItem("prosperProfile");
  if (p) {
    const profile = JSON.parse(p);
    document.getElementById("welcomeModal").classList.remove("show");
    document.getElementById("profileBar").style.display = "flex";
    document.getElementById("profileText").textContent = profile.bizName + " — " + profile.ownerName;
    document.getElementById("messages").innerHTML = '<div class="msg bot">Welcome back ' + profile.ownerName + '! I help with ' + profile.bizName + '. Try: Who owes me money?</div>';
    loadDash();
  } else {
    document.getElementById("welcomeModal").classList.add("show");
  }
}

async function saveProfile() {
  const bizName = document.getElementById("bizName").value.trim();
  const ownerName = document.getElementById("ownerName").value.trim();
  const bizEmail = document.getElementById("bizEmail").value.trim();
  if (!bizName || !ownerName || !bizEmail) { alert("Please fill all fields"); return; }
  localStorage.setItem("prosperProfile", JSON.stringify({ bizName, ownerName, bizEmail }));
  try {
    await fetch(API + "/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ bizName, ownerName, bizEmail })
    });
  } catch (e) { console.error(e); }
  loadProfile();
}

function resetProfile() {
  if (confirm("Reset business profile?")) {
    localStorage.removeItem("prosperProfile");
    location.reload();
  }
}

async function loadDash() {
  try {
    const profile = JSON.parse(localStorage.getItem("prosperProfile") || "{}");
    const bizId = (profile.bizName || "default").toLowerCase().replace(/ /g, "-");
    const r = await fetch(API + "/api/dashboard?business_id=" + bizId);
    const d = await r.json();
    document.getElementById("tr").textContent = "NGN " + d.today_revenue.toLocaleString();
    document.getElementById("tp").textContent = "NGN " + d.today_profit.toLocaleString();
    document.getElementById("lr").textContent = "NGN " + d.lifetime_revenue.toLocaleString();
    document.getElementById("out").textContent = "NGN " + d.outstanding.toLocaleString();
    document.getElementById("cust").textContent = d.total_customers;
    document.getElementById("ts").textContent = d.total_sales;
    document.getElementById("unpaidList").innerHTML = d.unpaid_invoices.map(function(i) {
      return '<div class="unpaid-item"><span>' + i.invoice_number + ' ' + i.customer_name + '</span><span>NGN ' + i.amount.toLocaleString() + '</span></div>';
    }).join("");
  } catch (e) { console.error(e); }
}

async function send() {
  const i = document.getElementById("input");
  const t = i.value.trim();
  if (!t) return;
  const profile = JSON.parse(localStorage.getItem("prosperProfile") || "{}");
  const m = document.getElementById("messages");
  m.innerHTML += '<div class="msg user">' + t + '</div>';
  i.value = "";
  m.innerHTML += '<div class="msg bot" id="ld">...</div>';
  m.scrollTop = m.scrollHeight;
  try {
    const r = await fetch(API + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: t, profile: profile })
    });
    const d = await r.json();
    document.getElementById("ld").remove();
    m.innerHTML += '<div class="msg bot">' + d.response + '</div>';
    m.scrollTop = m.scrollHeight;
    loadDash();
  } catch (e) { document.getElementById("ld").remove(); }
}

function quick(t) { document.getElementById("input").value = t; send(); }

loadProfile();
</script>
</body>
</html>
