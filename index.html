<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prosper Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#1a5f3f;min-height:100vh;padding:20px;}
.container{max-width:1200px;margin:0 auto;}
.header{text-align:center;color:white;padding:20px;}
.header h1{font-size:32px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
.card{background:white;border-radius:12px;padding:20px;}
.card h2{color:#1a5f3f;margin-bottom:15px;}
.chat{height:500px;display:flex;flex-direction:column;}
.messages{flex:1;overflow-y:auto;padding:10px 0;}
.msg{padding:10px;border-radius:8px;margin-bottom:8px;max-width:85%;white-space:pre-wrap;}
.msg.user{background:#1a5f3f;color:white;margin-left:auto;}
.msg.bot{background:#f0f0f0;}
.input-area{display:flex;gap:8px;margin-top:10px;}
input{flex:1;padding:12px;border:2px solid #ddd;border-radius:8px;}
button{padding:12px 20px;background:#1a5f3f;color:white;border:none;border-radius:8px;cursor:pointer;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;}
.stat{background:#e8f5e8;padding:12px;border-radius:8px;}
.stat-label{font-size:11px;color:#666;text-transform:uppercase;}
.stat-value{font-size:20px;font-weight:bold;color:#1a5f3f;}
.suggestion{display:inline-block;padding:5px 10px;background:#f0f0f0;border-radius:15px;margin:3px;cursor:pointer;font-size:12px;}
.unpaid-item{padding:8px;border-bottom:1px solid #eee;font-size:13px;display:flex;justify-content:space-between;}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>Prosper Assistant</h1><p style="color:white;">AI agent for Nigerian SMEs</p></div>
<div class="grid">
<div class="card chat">
<h2>Chat with Prosper</h2>
<div class="messages" id="messages"><div class="msg bot">Welcome oga! Try: Who owes me money?</div></div>
<div>
<span class="suggestion" onclick="quick('Who owes me money?')">Who owes me?</span>
<span class="suggestion" onclick="quick('Today report')">Today report</span>
<span class="suggestion" onclick="quick('Lifetime report')">Lifetime report</span>
<span class="suggestion" onclick="quick('All sales')">All sales</span>
</div>
<div class="input-area">
<input id="input" placeholder="Ask Prosper..." onkeypress="if(event.key==='Enter')send()">
<button onclick="send()">Send</button>
</div>
</div>
<div class="card">
<h2>Dashboard</h2>
<div class="stats">
<div class="stat"><div class="stat-label">Today Revenue</div><div class="stat-value" id="tr">-</div></div>
<div class="stat"><div class="stat-label">Today Profit</div><div class="stat-value" id="tp">-</div></div>
<div class="stat"><div class="stat-label">Lifetime Revenue</div><div class="stat-value" id="lr">-</div></div>
<div class="stat"><div class="stat-label">Outstanding</div><div class="stat-value" id="out">-</div></div>
<div class="stat"><div class="stat-label">Customers</div><div class="stat-value" id="cust">-</div></div>
<div class="stat"><div class="stat-label">Total Sales</div><div class="stat-value" id="ts">-</div></div>
</div>
<h2>Unpaid Invoices</h2>
<div id="unpaidList"></div>
</div>
</div>
</div>
<script>
const API="https://prosper-assistant-666245775274.us-central1.run.app";
async function loadDash(){
try{
const r=await fetch(API+"/api/dashboard");
const d=await r.json();
document.getElementById("tr").textContent="NGN "+d.today_revenue.toLocaleString();
document.getElementById("tp").textContent="NGN "+d.today_profit.toLocaleString();
document.getElementById("lr").textContent="NGN "+d.lifetime_revenue.toLocaleString();
document.getElementById("out").textContent="NGN "+d.outstanding.toLocaleString();
document.getElementById("cust").textContent=d.total_customers;
document.getElementById("ts").textContent=d.total_sales;
document.getElementById("unpaidList").innerHTML=d.unpaid_invoices.map(i=>`<div class="unpaid-item"><span>${i.invoice_number} ${i.customer_name}</span><span>NGN ${i.amount.toLocaleString()}</span></div>`).join("");
}catch(e){console.error(e);}
}
async function send(){
const i=document.getElementById("input");
const t=i.value.trim();
if(!t)return;
const m=document.getElementById("messages");
m.innerHTML+=`<div class="msg user">${t}</div>`;
i.value="";
m.innerHTML+=`<div class="msg bot" id="ld">...</div>`;
m.scrollTop=m.scrollHeight;
try{
const r=await fetch(API+"/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:t})});
const d=await r.json();
document.getElementById("ld").remove();
m.innerHTML+=`<div class="msg bot">${d.response}</div>`;
m.scrollTop=m.scrollHeight;
loadDash();
}catch(e){document.getElementById("ld").remove();}
}
function quick(t){document.getElementById("input").value=t;send();}
loadDash();
setInterval(loadDash,10000);
</script>
</body>
</html>
